services:
  app:
    image: python:3.12.2-slim
    volumes:
      - .:/app
    working_dir: /app
    command: >
      sh -c "python -m pip install --upgrade pip &&
             python -m pip install -r requirements.txt &&
             python -c 'import boto3; print(\"Boto3 version:\", boto3.__version__)' &&
             tail -f /dev/null"
